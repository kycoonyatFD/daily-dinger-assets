const SILHOUETTE = 'https://s3.us-east-1.amazonaws.com/autocdn.fanduel.com/f2p-fe/images/Silhouette.png';
let currentView = 'overview';
function getAbbr(teamName) {
  return (TEAM_COLORS[teamName] || {}).abbr || teamName;
}
function getBg(teamName) {
  return (TEAM_COLORS[teamName] || {}).bg || '#333';
}
function copyUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    btn.classList.add('copied');
    btn.textContent = '✓';
    setTimeout(() => { btn.classList.remove('copied'); btn.textContent = 'Copy'; }, 1500);
    showToast('Copied!');
  });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 1800);
}
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '<div style="padding:8px 14px 4px;font-size:10px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.6px">Overview</div>';
  const overviewItem = document.createElement('div');
  overviewItem.className = 'team-item' + (currentView === 'overview' ? ' active' : '');
  overviewItem.innerHTML = '<div class="dot" style="background:#58a6ff;font-size:9px">ALL</div><span>All Teams</span>';
  overviewItem.onclick = showOverview;
  sb.appendChild(overviewItem);
  sb.innerHTML += '<div style="padding:8px 14px 4px;font-size:10px;color:#8b949e;font-weight:600;text-transform:uppercase;letter-spacing:.6px;margin-top:6px">Teams</div>';
  OVERVIEW.forEach(t => {
    const abbr = getAbbr(t.team);
    const bg = getBg(t.team);
    const item = document.createElement('div');
    item.className = 'team-item' + (currentView === abbr ? ' active' : '');
    item.dataset.abbr = abbr;
    item.innerHTML = `<div class="dot" style="background:${bg}">${abbr}</div><span>${t.team}</span>`;
    item.onclick = () => showTeam(t.team);
    sb.appendChild(item);
  });
}
function showOverview() {
  currentView = 'overview';
  buildSidebar();
  const main = document.getElementById('main');
  main.innerHTML = '<div class="section-title">Top 3 HR Threats — All Teams</div><div class="overview-grid" id="grid"></div>';
  const grid = document.getElementById('grid');
  OVERVIEW.forEach(t => {
    const abbr = getAbbr(t.team);
    const bg = getBg(t.team);
    const card = document.createElement('div');
    card.className = 'team-card';
    let playersHtml = t.players.map(p => `
      <div class="card-player">
        <img class="thumb" src="${p.url}" onerror="this.src='${SILHOUETTE}'" loading="lazy">
        <span class="card-pname">${p.name}</span>
        <div class="btn-group">
          <a class="btn btn-view" href="${p.url}" target="_blank">View</a>
          <button class="btn btn-copy" onclick="event.stopPropagation();copyUrl('${p.url}',this)">Copy</button>
        </div>
      </div>`).join('');
    card.innerHTML = `
      <div class="card-header" style="background:${bg}">
        <div class="card-abbr">${abbr}</div>
        <div class="card-name">${t.team}</div>
      </div>
      <div class="card-body">${playersHtml}</div>`;
    card.onclick = (e) => { if (!e.target.closest('.btn')) showTeam(t.team); };
    grid.appendChild(card);
  });
}
function showTeam(teamName) {
  const abbr = getAbbr(teamName);
  const bg = getBg(teamName);
  const teamData = TEAMS[abbr];
  currentView = abbr;
  buildSidebar();
  const main = document.getElementById('main');
  if (!teamData) {
    main.innerHTML = `<div style="color:#f85149;padding:20px">No data found for ${teamName} (abbr: ${abbr})</div>`;
    return;
  }
  let rows = teamData.players.map((p, i) => {
    const cls = i % 2 === 0 ? 'row-even' : 'row-odd';
    const img = p.url && p.url !== '' ? `<img class="thumb-sm" src="${p.url}" onerror="this.src='${SILHOUETTE}'" loading="lazy">` : `<img class="thumb-sm" src="${SILHOUETTE}">`;
    const urlVal = p.url || SILHOUETTE;
    return `<tr class="${cls}">
      <td>${img} &nbsp;${p.name}</td>
      <td style="color:#8b949e">${p.pos}</td>
      <td style="max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:monospace;font-size:10px;color:#58a6ff">${urlVal}</td>
      <td>
        <div class="btn-group">
          <a class="btn btn-view" href="${urlVal}" target="_blank">View</a>
          <button class="btn btn-copy" onclick="copyUrl('${urlVal}',this)">Copy</button>
        </div>
      </td>
    </tr>`;
  }).join('');
  main.innerHTML = `
    <button class="back-btn" onclick="showOverview()">← All Teams</button>
    <div class="team-header-bar" style="background:${bg}20;border:1px solid ${bg}40">
      <div class="dot" style="background:${bg};width:36px;height:22px;font-size:10px">${abbr}</div>
      <div class="team-full-name">${teamData.full_name}</div>
      <span style="font-size:11px;color:#8b949e;margin-left:auto">${teamData.players.length} players</span>
    </div>
    <table class="roster-table">
      <thead style="background:#21262d"><tr>
        <th>Player</th><th>Positions</th><th>Photo URL</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
function onSearch(q) {
  q = q.trim().toLowerCase();
  const countEl = document.getElementById('search-count');
  if (!q) { countEl.textContent = ''; showOverview(); return; }
  currentView = 'search';
  buildSidebar();
  const main = document.getElementById('main');
  let results = [];
  OVERVIEW.forEach(t => {
    t.players.forEach(p => {
      if (p.name.toLowerCase().includes(q) || t.team.toLowerCase().includes(q)) {
        results.push({team: t.team, player: p});
      }
    });
    // Also check full roster
    const abbr = getAbbr(t.team);
    const td = TEAMS[abbr];
    if (td) {
      td.players.forEach(p => {
        if (p.name.toLowerCase().includes(q)) {
          if (!results.find(r => r.player.name === p.name && r.team === t.team)) {
            results.push({team: t.team, player: p});
          }
        }
      });
    }
  });
  countEl.textContent = results.length ? `${results.length} result${results.length !== 1 ? 's' : ''}` : 'No results';
  if (!results.length) { main.innerHTML = '<div style="color:#8b949e;padding:20px">No players or teams matched.</div>'; return; }
  let html = `<div class="section-title">Search results for "${q}"</div><div class="overview-grid">`;
  results.forEach(r => {
    const abbr = getAbbr(r.team);
    const bg = getBg(r.team);
    const p = r.player;
    html += `<div class="team-card">
      <div class="card-header" style="background:${bg}">
        <div class="card-abbr">${abbr}</div>
        <div class="card-name">${r.team}</div>
      </div>
      <div class="card-body">
        <div class="card-player">
          <img class="thumb" src="${p.url || SILHOUETTE}" onerror="this.src='${SILHOUETTE}'" loading="lazy">
          <span class="card-pname">${p.name}${p.pos ? ' <span style="color:#8b949e;font-size:10px">'+p.pos+'</span>' : ''}</span>
          <div class="btn-group">
            <a class="btn btn-view" href="${p.url || SILHOUETTE}" target="_blank">View</a>
            <button class="btn btn-copy" onclick="copyUrl('${p.url || SILHOUETTE}',this)">Copy</button>
          </div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  main.innerHTML = html;
}
// Init
buildSidebar();
showOverview();
</script>
</body>
